name: Sync Fork from Upstream

on:
  schedule:
    # 每 6 小时检查一次上游仓库
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        id: sync
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/PotatoChipking/FinanceAssistant.git
          git fetch upstream main

          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/main)
          echo "Local HEAD:   $LOCAL"
          echo "Upstream HEAD: $REMOTE"

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEHIND=$(git rev-list --count HEAD..upstream/main || echo 0)
          if [ "$BEHIND" -eq 0 ]; then
            echo "Fork is ahead of upstream; nothing to sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Upstream has $BEHIND new commit(s). Attempting merge..."
          # 先尝试干净合并；若发生冲突，优先采用上游版本(-X theirs)自动解决
          if git merge upstream/main --no-edit; then
            echo "Clean merge succeeded."
          else
            echo "::warning::Merge conflicts detected. Resolving with upstream priority (-X theirs)..."
            git merge --abort
            git merge -X theirs upstream/main --no-edit
            echo "Merge completed (upstream priority on conflicts)."
          fi

          git push origin main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Docker build
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Upstream changes synced. Triggering Docker image build..."
          gh workflow run docker-build.yml --ref main || echo "Could not trigger docker-build (may already be running)."
          echo "Done."
